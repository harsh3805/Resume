<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Harsh Vardhan — Data & ML Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #08090a;
    --bg-elevated: #0e0f11;
    --surface: #131517;
    --border: #1f2023;
    --border-hover: #2a2c30;
    --text: #f7f8f8;
    --text-secondary: #b4b8c5;
    --text-muted: #6b7280;
    --accent: #6ee7b7;
    --accent-2: #818cf8;
    --accent-3: #f472b6;
    --accent-hover: #7170ff;
    --glow: rgba(110, 231, 183, 0.35);
    --heading-font: 'Syne', 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    font-feature-settings: "cv11", "ss01";
    position: relative;
  }

  /* ========== DYNAMIC BACKGROUND ========== */
  .bg-canvas { position: fixed; inset: 0; z-index: -3; pointer-events: none; }
  .bg-grid {
    position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 80%);
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift {
    0% { background-position: 0 0, 0 0; }
    100% { background-position: 60px 60px, 60px 60px; }
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: -1; opacity: 0.45; will-change: transform; }
  .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, var(--accent), transparent 70%); top: -150px; left: 10%; animation: orbFloat1 18s ease-in-out infinite; }
  .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, var(--accent-2), transparent 70%); top: 30%; right: -100px; animation: orbFloat2 22s ease-in-out infinite; }
  .orb-3 { width: 450px; height: 450px; background: radial-gradient(circle, var(--accent-3), transparent 70%); bottom: -100px; left: 30%; animation: orbFloat3 25s ease-in-out infinite; }
  @keyframes orbFloat1 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(100px,80px) scale(1.1); } 66% { transform: translate(-50px,120px) scale(0.9); } }
  @keyframes orbFloat2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-120px,60px) scale(1.15); } }
  @keyframes orbFloat3 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(80px,-100px) scale(0.95); } 66% { transform: translate(-100px,-50px) scale(1.1); } }
  .cursor-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; pointer-events: none; z-index: -1; background: radial-gradient(circle, rgba(110, 231, 183, 0.12) 0%, transparent 60%); transform: translate(-50%, -50%); transition: opacity 0.3s ease; opacity: 0; }

  /* Navigation */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(8, 9, 10, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-inner { max-width: 1200px; width: 100%; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .logo-mark { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #07110d; transition: all 0.3s ease; }
  .logo:hover .logo-mark { transform: rotate(-8deg) scale(1.1); box-shadow: 0 0 20px 2px var(--glow); }
  .nav-links { display: flex; gap: 4px; list-style: none; }
  .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 6px; transition: all 0.2s ease; }
  .nav-links a:hover { color: var(--text); background: var(--surface); transform: translateY(-1px); }
  .nav-cta { background: var(--text); color: var(--bg); padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; text-decoration: none; transition: all 0.2s ease; position: relative; overflow: hidden; }
  .nav-cta::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(110, 231, 183, 0.4), transparent); transform: translateX(-100%); transition: transform 0.5s ease; }
  .nav-cta:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,255,255,0.15); }
  .nav-cta:hover::before { transform: translateX(100%); }

  /* Container */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
  section { padding: 96px 0; }

  /* Section header */
  .section-meta { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; color: var(--text-muted); margin-bottom: 16px; font-weight: 500; }
  .section-meta::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 8px var(--accent); opacity: 1; } 50% { box-shadow: 0 0 16px var(--accent); opacity: 0.7; } }
  .section-title { font-family: var(--heading-font); font-size: 40px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 16px; }
  .section-subtitle { color: var(--text-secondary); font-size: 17px; max-width: 580px; margin-bottom: 56px; }

  /* ============ HERO ============ */
  #hero { padding-top: 160px; padding-bottom: 120px; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 100px; background: var(--surface); border: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; transition: all 0.3s ease; cursor: default; }
  .hero-badge:hover { border-color: var(--accent); background: var(--bg-elevated); transform: translateY(-2px); box-shadow: 0 8px 24px var(--glow); }
  .hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
  .hero-name { font-family: var(--heading-font); font-size: clamp(64px, 12vw, 160px); font-weight: 800; letter-spacing: -0.05em; line-height: 0.92; margin-bottom: 20px; background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent-2) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: heroFadeIn 1s ease-out; }
  .hero-name .last { display: block; background: linear-gradient(135deg, var(--accent-2), var(--accent-3)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .hero-title { font-family: var(--heading-font); font-size: clamp(28px, 4vw, 48px); font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 24px; color: var(--text-secondary); animation: heroFadeIn 1s ease-out 0.15s backwards; }
  .hero-title .accent { background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  @keyframes heroFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .hero-subtitle { font-size: 20px; color: var(--text-secondary); max-width: 600px; margin-bottom: 40px; line-height: 1.5; letter-spacing: -0.01em; animation: heroFadeIn 1s ease-out 0.2s backwards; }
  .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; animation: heroFadeIn 1s ease-out 0.4s backwards; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; text-decoration: none; transition: all 0.2s ease; border: 1px solid transparent; position: relative; overflow: hidden; cursor: pointer; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #a7f3d0); color: #07110d; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--glow); }
  .btn-primary:hover svg { transform: translateX(4px); }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--accent); background: var(--bg-elevated); transform: translateY(-2px); box-shadow: 0 8px 24px var(--glow); }
  .btn svg { width: 14px; height: 14px; transition: transform 0.2s ease; }

  /* Hero quick-contact row */
  .hero-contact { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 32px; animation: heroFadeIn 1s ease-out 0.6s backwards; }
  .hero-contact a, .hero-contact span { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .hero-contact a:hover { color: var(--accent); }
  .hero-contact svg { width: 14px; height: 14px; fill: currentColor; }

  /* ============ ABOUT ============ */
  .about-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 64px; align-items: start; }
  .about-text p { color: var(--text-secondary); margin-bottom: 16px; font-size: 16px; line-height: 1.65; }
  .about-text strong { color: var(--text); font-weight: 500; }
  .stats-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; transition: all 0.3s ease; }
  .stats-card:hover { border-color: var(--border-hover); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); transition: background 0.2s ease; }
  .stat-row:hover { background: var(--bg-elevated); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text-secondary); font-size: 14px; }
  .stat-value { color: var(--text); font-weight: 600; font-size: 14px; font-family: var(--mono); }

  /* ============ SKILLS ============ */
  .skills-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .skill { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.25s ease; cursor: default; position: relative; overflow: hidden; }
  .skill::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--glow), transparent); opacity: 0; transition: opacity 0.3s ease; }
  .skill > * { position: relative; z-index: 1; }
  .skill:hover { border-color: var(--accent); background: var(--bg-elevated); transform: translateY(-3px); box-shadow: 0 10px 30px var(--glow); }
  .skill:hover::before { opacity: 0.15; }
  .skill:hover .skill-dot { transform: scale(1.5); box-shadow: 0 0 12px var(--accent); }
  .skill-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; transition: all 0.3s ease; }
  .skill-name { font-size: 14px; font-weight: 500; }
  /* Skill bars (proficiency) */
  .skill-bars { display: flex; flex-direction: column; gap: 14px; }
  .skill-bar-item { }
  .skill-bar-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .skill-bar-label .level { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .skill-bar-bg { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .skill-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 4px; transition: width 1.2s ease; }

  /* ============ PROJECTS ============ */
  .projects-list { display: flex; flex-direction: column; gap: 8px; }
  .project { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: all 0.3s ease; display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center; position: relative; overflow: hidden; text-decoration: none; color: inherit; }
  .project::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: linear-gradient(180deg, var(--accent), var(--accent-2)); transform: scaleY(0); transform-origin: top; transition: transform 0.3s ease; }
  .project::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--glow), transparent 40%); opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
  .project:hover { border-color: var(--border-hover); background: var(--bg-elevated); transform: translateY(-2px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
  .project:hover::before { transform: scaleY(1); }
  .project:hover::after { opacity: 0.5; }
  .project > * { position: relative; z-index: 1; }
  .project-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .project-status { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 6px; }
  .project-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .status-progress { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
  .status-progress::before { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: pulse 2s ease-in-out infinite; }
  .status-done { background: rgba(110, 231, 183, 0.12); color: var(--accent); }
  .status-done::before { background: var(--accent); }
  .project-label { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
  .project-date { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .project-title { font-family: var(--heading-font); font-size: 18px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 8px; transition: color 0.2s ease; }
  .project:hover .project-title { color: var(--accent); }
  .project-desc { color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
  .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-family: var(--mono); font-size: 11px; color: var(--text-muted); padding: 3px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; transition: all 0.2s ease; }
  .project:hover .tag { border-color: var(--border-hover); color: var(--text-secondary); }
  .project-arrow { width: 32px; height: 32px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all 0.3s ease; flex-shrink: 0; }
  .project:hover .project-arrow { background: var(--accent); color: #07110d; border-color: var(--accent); transform: translateX(4px) rotate(-45deg); }

  /* ============ EDUCATION TIMELINE ============ */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: grid; grid-template-columns: 180px 1fr auto; gap: 32px; padding: 24px 16px; border-bottom: 1px solid var(--border); border-radius: 8px; transition: all 0.25s ease; align-items: start; }
  .timeline-item:hover { background: var(--surface); transform: translateX(8px); }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-date { font-family: var(--mono); font-size: 13px; color: var(--text-muted); padding-top: 2px; transition: color 0.2s ease; }
  .timeline-item:hover .timeline-date { color: var(--accent); }
  .timeline-content h3 { font-family: var(--heading-font); font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .timeline-content p { color: var(--text-secondary); font-size: 14px; }
  .timeline-badge { font-family: var(--mono); font-size: 11px; padding: 4px 10px; border-radius: 4px; background: rgba(110, 231, 183, 0.08); border: 1px solid rgba(110, 231, 183, 0.25); color: var(--accent); align-self: center; white-space: nowrap; }

  /* ============ ACHIEVEMENTS ============ */
  .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
  .achievement { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; transition: all 0.25s ease; cursor: default; }
  .achievement:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 24px var(--glow); }
  .achievement:hover .achievement-icon { transform: rotate(-10deg) scale(1.1); background: var(--accent); color: #07110d; }
  .achievement-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.3s ease; }
  .achievement-text { font-size: 14px; font-weight: 500; }

  /* ============ INFO / LANGUAGES ============ */
  .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: all 0.3s ease; }
  .info-card:hover { border-color: var(--border-hover); }
  .info-card h4 { font-family: var(--heading-font); font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 16px; }
  .info-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .info-item:last-child { border-bottom: none; }
  .info-item .label { color: var(--text-secondary); }
  .info-item .value { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .lang-level { font-family: var(--mono); font-size: 11px; color: var(--accent); background: rgba(110, 231, 183, 0.08); border: 1px solid rgba(110, 231, 183, 0.25); padding: 3px 10px; border-radius: 4px; }

  /* ============ CONTACT ============ */
  #contact { text-align: center; padding: 120px 0; }
  .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 64px 32px; max-width: 720px; margin: 0 auto; position: relative; overflow: hidden; transition: all 0.3s ease; }
  .contact-card:hover { border-color: var(--accent); box-shadow: 0 30px 80px var(--glow); }
  .contact-card::before { content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 400px; height: 200px; background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%); opacity: 0.6; animation: glowPulse 4s ease-in-out infinite; }
  @keyframes glowPulse { 0%,100% { opacity: 0.6; transform: translateX(-50%) scale(1); } 50% { opacity: 0.9; transform: translateX(-50%) scale(1.1); } }
  .contact-card > * { position: relative; }
  .contact-title { font-family: var(--heading-font); font-size: 36px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 12px; }
  .contact-desc { color: var(--text-secondary); margin-bottom: 32px; max-width: 480px; margin-left: auto; margin-right: auto; }
  .contact-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* ============ FOOTER ============ */
  footer { border-top: 1px solid var(--border); padding: 24px; position: relative; z-index: 1; }
  .footer-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted); gap: 16px; flex-wrap: wrap; }
  .footer-links { display: flex; gap: 16px; }
  .footer-links a { color: var(--text-muted); text-decoration: none; transition: all 0.2s; }
  .footer-links a:hover { color: var(--accent); transform: translateY(-1px); }

  /* Reveal on scroll */
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* Mobile */
  @media (max-width: 768px) {
    .nav-links { display: none; }
    section { padding: 64px 0; }
    .about-grid, .skills-layout, .info-row { grid-template-columns: 1fr; gap: 32px; }
    .project { grid-template-columns: 1fr; }
    .project-arrow { display: none; }
    .timeline-item { grid-template-columns: 1fr; gap: 8px; }
    .timeline-badge { justify-self: start; }
    .section-title { font-size: 32px; }
    .cursor-glow { display: none; }
  }


  /* ============ PDF / PRINT EXPORT ============ */
  @page { size: A4; margin: 10mm; }
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body {
      background: #08090a !important;
      color: #f7f8f8 !important;
      overflow: visible !important;
    }
    nav { position: static !important; margin-bottom: 18px; }
    .bg-canvas, .cursor-glow { display: none !important; }
    .bg-grid, .orb { position: fixed !important; }
    .reveal { opacity: 1 !important; transform: none !important; }
    section { padding: 26px 0 !important; break-inside: avoid; page-break-inside: avoid; }
    #hero { padding-top: 26px !important; padding-bottom: 26px !important; }
    .container { max-width: 100% !important; padding: 0 !important; }
    .btn, .nav-cta, .hero-badge, .skill, .project, .stats-card, .info-card, .achievement, .contact-card {
      box-shadow: none !important;
      transform: none !important;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    a { color: inherit !important; text-decoration: none !important; }
    footer { break-inside: avoid; page-break-inside: avoid; }
  }

</style>
</head>
<body>

<canvas class="bg-canvas" id="particles"></canvas>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      // Animate skill bars when skills section reveals
      if (entry.target.id === 'skills') {
        entry.target.querySelectorAll('.skill-bar-fill').forEach(b => {
          b.style.width = b.dataset.value + '%';
        });
      }
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// Cursor glow follows pointer
const cursorGlow = document.getElementById('cursorGlow');
let cursorVisible = false;
document.addEventListener('mousemove', (e) => {
  if (!cursorVisible) { cursorGlow.style.opacity = '1'; cursorVisible = true; }
  cursorGlow.style.left = e.clientX + 'px';
  cursorGlow.style.top  = e.clientY + 'px';
});
document.addEventListener('mouseleave', () => { cursorGlow.style.opacity = '0'; cursorVisible = false; });

// Spotlight effect on project cards (delegated since cards are rendered dynamically)
document.addEventListener('mousemove', (e) => {
  const card = e.target.closest && e.target.closest('.project');
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  card.style.setProperty('--mouse-x', x + '%');
  card.style.setProperty('--mouse-y', y + '%');
});

// Particle network background
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 50;
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = Math.random() * 1.5 + 0.5;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width)  this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }
  draw() {
    ctx.fillStyle = 'rgba(110, 231, 183, 0.5)';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}
for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
function connectParticles() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        ctx.strokeStyle = `rgba(110, 231, 183, ${0.2 * (1 - dist / 140)})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
}
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  connectParticles();
  requestAnimationFrame(animate);
}
animate();
